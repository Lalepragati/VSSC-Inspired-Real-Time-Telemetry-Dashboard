services:
  - type: web
    name: vssc-inspired-real-time-telemetry
    runtime: python
    buildCommand: pip install -r backend/requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ALLOWED_ORIGINS
        value: "*"

  - type: web
    name: vssc-telemetry-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install -g pnpm && pnpm install && pnpm build
    staticPublishPath: dist
    envVars:
      - key: VITE_WS_URL
        value: wss://vssc-inspired-real-time-telemetry.onrender.com/ws
